name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --python ${{ matrix.python-version }}

      # Non-blocking for now: catxas/ has a pre-existing lint backlog
      # (~50 issues, incl. possible undefined-name bugs) to be cleaned up
      # on a dedicated branch. Remove continue-on-error once that lands.
      - name: Lint with ruff
        run: uv run ruff check .
        continue-on-error: true

      - name: Run tests
        run: uv run pytest -q
