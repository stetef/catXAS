name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # --extra notebooks pulls the multivariate-analysis stack (scikit-learn,
      # kneed, pymcr) so the catxas.pca / catxas.mcrals tests can run.
      - name: Install the project
        run: uv sync --extra notebooks --python ${{ matrix.python-version }}

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest -q
